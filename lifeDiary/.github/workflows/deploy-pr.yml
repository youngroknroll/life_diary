name: Update deploy PR

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update deploy PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git fetch origin production

          DIFF_COUNT=$(git rev-list --count origin/production..origin/main)
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "production already up to date. No PR needed."
            exit 0
          fi

          EXISTING=$(gh pr list --base production --head main --state open --json number --jq '.[0].number // empty')

          COMMITS=$(git log origin/production..origin/main --pretty=format:'- %s (%h)' | head -50)

          BODY=$(cat <<EOF
          ## Deploy candidate

          **${DIFF_COUNT} commits** ready to deploy from \`main\` to \`production\`.

          Merge this PR to deploy to Render.

          ### Commits

          ${COMMITS}

          ---
          Auto-generated by \`.github/workflows/deploy-pr.yml\`. Updates on every push to main.
          EOF
          )

          TITLE="Deploy: main -> production (${DIFF_COUNT} commits)"

          if [ -z "${EXISTING}" ]; then
            gh pr create \
              --base production \
              --head main \
              --title "${TITLE}" \
              --body "${BODY}"
            echo "Created new deploy PR."
          else
            gh pr edit "${EXISTING}" \
              --title "${TITLE}" \
              --body "${BODY}"
            echo "Updated existing deploy PR #${EXISTING}."
          fi

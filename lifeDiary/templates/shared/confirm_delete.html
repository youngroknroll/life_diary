{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2>{% block confirm_title %}삭제{% endblock %}</h2>
    {% block confirm_body %}
        <p>정말로 삭제하시겠습니까?</p>
    {% endblock %}
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">삭제</button>
        <a href="{% block cancel_url %}{% endblock %}" class="btn btn-secondary">취소</a>
    </form>
</div>
{% endblock %}

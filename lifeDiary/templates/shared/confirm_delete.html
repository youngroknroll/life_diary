{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<div class="container mt-4">
    <h2>{% block confirm_title %}{% trans "삭제" %}{% endblock %}</h2>
    {% block confirm_body %}
        <p>{% trans "정말로 삭제하시겠습니까?" %}</p>
    {% endblock %}
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">{% trans "삭제" %}</button>
        <a href="{% block cancel_url %}{% endblock %}" class="btn btn-secondary">{% trans "취소" %}</a>
    </form>
</div>
{% endblock %}

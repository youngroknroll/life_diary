{% extends 'base.html' %}

{% block title %}태그 관리 | 라이프 다이어리{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="fas fa-tags me-2"></i>
                    태그 관리
                    {% if user.is_superuser %}
                        <small class="badge bg-warning text-dark ms-2">관리자</small>
                    {% endif %}
                </h5>
                <button type="button" class="btn btn-primary btn-sm" onclick="openTagFormModal()">
                    <i class="fas fa-plus me-1"></i>
                    새 태그 생성
                </button>
            </div>
            <div class="card-body">
                <div id="tagListContainer">
                    <!-- 태그 목록이 여기에 동적으로 로드됩니다 -->
                </div>

                <div id="tagEmptyState" class="text-center py-4" style="display: none;">
                    <i class="fas fa-tags text-muted mb-3" style="font-size: 3rem;"></i>
                    <h5 class="text-muted">등록된 태그가 없습니다.</h5>
                    <p class="text-muted">새 태그를 생성하여 시간 기록을 시작해보세요.</p>
                </div>
            </div>
        </div>
    </div>
</div>

{% include 'tags/_tag_modal.html' %}
{% endblock %}

{% block extra_js %}
{% load static %}
<script src="{% static 'core/js/tag.js' %}" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const initialTags = JSON.parse('{{ tags_json|escapejs }}');
    const categories = JSON.parse('{{ categories_json|escapejs }}');
    // 전역으로 카테고리 데이터 공유 (tag.js에서 사용)
    window._categories = categories;

    const isSuperuser = {{ user.is_superuser|yesno:"true,false" }};

    function escapeHTML(str) {
        return str.replace(/[&<>"']/g, function(match) {
            return {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'}[match];
        });
    }

    function createTagCardHtml(tag) {
        const canEdit = !tag.is_default || isSuperuser;
        const canDelete = !tag.is_default || isSuperuser;
        return `
            <div class="col-md-6 col-lg-4 mb-3">
                <div class="card h-100 ${tag.is_default ? 'border-warning' : ''}">
                    <div class="card-body">
                        <div class="d-flex align-items-center mb-2">
                            <span class="badge me-2" style="background-color: ${tag.color}; color: ${getContrastTextColor(tag.color)}; font-size: 0.9em;">
                                ${escapeHTML(tag.name)}
                            </span>
                            ${tag.is_default ? '<small class="badge bg-warning text-dark">기본</small>' : ''}
                        </div>
                        <small class="text-muted">${tag.color}</small>
                    </div>
                    <div class="card-footer bg-transparent">
                        <div class="d-flex gap-2">
                            ${canEdit ? `
                                <button class="btn btn-outline-primary btn-sm flex-fill"
                                        onclick="openTagFormModal({id: ${tag.id}, name: '${escapeHTML(tag.name)}', color: '${tag.color}', is_default: ${tag.is_default}, category_id: ${tag.category_id}})">
                                    <i class="fas fa-edit me-1"></i>수정
                                </button>` : ''}
                            ${canDelete ? `
                                <button class="btn btn-outline-danger btn-sm flex-fill"
                                        onclick="deleteTag(${tag.id}, '${escapeHTML(tag.name)}')">
                                    <i class="fas fa-trash me-1"></i>삭제
                                </button>` : ''}
                        </div>
                    </div>
                </div>
            </div>`;
    }

    function renderTags(tags) {
        const container = document.getElementById('tagListContainer');
        const emptyState = document.getElementById('tagEmptyState');
        if (!tags || tags.length === 0) {
            container.innerHTML = '';
            emptyState.style.display = 'block';
            return;
        }
        emptyState.style.display = 'none';
        container.innerHTML = '';

        // 카테고리별로 그룹핑
        categories.forEach(cat => {
            const catTags = tags.filter(t => t.category_id === cat.id);
            if (catTags.length === 0) return;

            let html = `
                <div class="mb-4">
                    <h6 class="mb-3">
                        <span class="badge me-2" style="background-color: ${cat.color};">&nbsp;</span>
                        ${escapeHTML(cat.name)}
                        <small class="text-muted ms-1">(${catTags.length})</small>
                    </h6>
                    <div class="row">`;
            catTags.forEach(tag => {
                html += createTagCardHtml(tag);
            });
            html += `</div></div>`;
            container.innerHTML += html;
        });

        // 카테고리 미할당 태그 (혹시 있을 경우)
        const uncategorized = tags.filter(t => !t.category_id);
        if (uncategorized.length > 0) {
            let html = `
                <div class="mb-4">
                    <h6 class="mb-3 text-muted">
                        <i class="fas fa-question-circle me-1"></i>미분류
                        <small class="text-muted ms-1">(${uncategorized.length})</small>
                    </h6>
                    <div class="row">`;
            uncategorized.forEach(tag => {
                html += createTagCardHtml(tag);
            });
            html += `</div></div>`;
            container.innerHTML += html;
        }
    }

    async function fetchAndRenderTags() {
        try {
            const response = await fetch('/api/tags/');
            const data = await response.json();
            if (!data.success) {
                document.getElementById('tagListContainer').innerHTML = `<div class="alert alert-danger">${data.message}</div>`;
                return;
            }
            renderTags(data.tags);
        } catch (error) {
            console.error('태그 로드 오류:', error);
            document.getElementById('tagListContainer').innerHTML = `<div class="alert alert-danger">태그를 불러오는 중 오류가 발생했습니다.</div>`;
        }
    }
    document.addEventListener('tags-updated', fetchAndRenderTags);
    renderTags(initialTags);
});
</script>
{% endblock %}

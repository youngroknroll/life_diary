{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "비밀번호 변경 완료" %} | {% trans "라이프 다이어리" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card shadow">
            <div class="card-body text-center">
                <i class="fas fa-circle-check fa-2x text-success mb-3"></i>
                <h5>{% trans "비밀번호가 변경되었습니다" %}</h5>
                <p class="text-muted">{% trans "새 비밀번호로 로그인하실 수 있습니다." %}</p>
                <a href="{% url 'users:login' %}" class="btn btn-primary">{% trans "로그인" %}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

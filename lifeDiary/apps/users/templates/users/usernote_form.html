{% extends 'base.html' %}
{% load i18n %}
{% block content %}
<div class="container mt-4">
    <h2>{% if mode == 'create' %}{% trans "특이사항 추가" %}{% else %}{% trans "특이사항 수정" %}{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="{{ form.note.id_for_label }}" class="form-label">{{ form.note.label }}</label>
            {{ form.note }}
            {% include 'shared/_field_errors.html' with field=form.note %}
        </div>
        <button type="submit" class="btn btn-success">{% trans "저장" %}</button>
        <a href="{% url 'users:usernote_list' %}" class="btn btn-secondary">{% trans "목록으로" %}</a>
    </form>
</div>
{% endblock %}

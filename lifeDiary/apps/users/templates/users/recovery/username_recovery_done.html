{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "아이디 찾기" %} | {% trans "라이프 다이어리" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card auth-card shadow">
            <div class="card-body text-center">
                <i class="fas fa-envelope-circle-check fa-2x text-primary mb-3"></i>
                <h5>{% trans "메일을 확인해주세요" %}</h5>
                <p class="text-muted">
                    {% trans "입력하신 이메일이 등록되어 있다면, 해당 계정의 아이디가 발송되었습니다. 메일이 보이지 않으면 스팸함을 확인해주세요." %}
                </p>
                <a href="{% url 'users:login' %}" class="btn btn-primary">{% trans "로그인으로 돌아가기" %}</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

name: Update deploy PR

on:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  update-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install LifeDiary dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r lifeDiary/requirements.txt

      - name: Verify LifeDiary deploy readiness
        working-directory: lifeDiary
        env:
          DJANGO_SECRET_KEY: test-ci-secret-value-for-deploy-readiness-checks-only-1234567890
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_HOST: localhost
          DB_PORT: '6543'
          RESEND_API_KEY: re_test_dummy
          DEFAULT_FROM_EMAIL: LifeDiary <noreply@example.com>
        run: |
          python -m pytest lifeDiary/test_prod_settings.py apps/core/test_email_backends.py --tb=short
          python manage.py check --settings=lifeDiary.settings.prod --deploy --fail-level ERROR

      - name: Create or update deploy PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi

              if [ "${attempt}" -lt 3 ]; then
                echo "Attempt ${attempt} failed. Retrying in 5 seconds..."
                sleep 5
              fi
            done

            echo "Command failed after 3 attempts: $*"
            return 1
          }

          git fetch origin production

          DIFF_COUNT=$(git rev-list --count origin/production..origin/main)
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "production already up to date. No PR needed."
            exit 0
          fi

          EXISTING=$(retry gh pr list --base production --head main --state open --json number --jq '.[0].number // empty')

          COMMITS=$(git log origin/production..origin/main --pretty=format:'- %s (%h)' | head -50)

          BODY=$(cat <<EOF
          ## Deploy candidate

          **${DIFF_COUNT} commits** ready to deploy from \`main\` to \`production\`.

          Merge this PR to deploy to Render.

          ### Commits

          ${COMMITS}

          ---
          Auto-generated by \`.github/workflows/deploy-pr.yml\`. Updates on every push to main.
          EOF
          )

          TITLE="Deploy: main -> production (${DIFF_COUNT} commits)"

          if [ -z "${EXISTING}" ]; then
            retry gh pr create \
              --base production \
              --head main \
              --title "${TITLE}" \
              --body "${BODY}"
            echo "Created new deploy PR."
          else
            retry gh pr edit "${EXISTING}" \
              --title "${TITLE}" \
              --body "${BODY}"
            echo "Updated existing deploy PR #${EXISTING}."
          fi
